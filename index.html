<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guitar Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <button id="mobile-menu-btn" class="mobile-menu-btn" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <nav id="sidebar">
        <header class="sidebar-header">
            <h1>Guitar Lab</h1>
            <p class="tagline">Master the fretboard</p>
        </header>
        <div id="progress-bar-container">
            <div id="progress-bar"></div>
            <span id="progress-text">0% complete</span>
        </div>
        <ul id="lesson-list"></ul>
    </nav>

    <main id="content">
        <section id="lesson-view"></section>

        <section id="fretboard-container" class="hidden">
            <div class="fretboard-controls">
                <button id="clear-fretboard" class="btn btn-sm">Clear</button>
                <label>
                    <input type="checkbox" id="show-all-notes"> Show all notes
                </label>
                <select id="highlight-select">
                    <option value="">Highlight...</option>
                </select>
            </div>
            <div id="fretboard"></div>
        </section>

        <section id="quiz-container" class="hidden"></section>

        <nav class="lesson-nav">
            <button id="prev-lesson" class="btn">Previous</button>
            <button id="next-lesson" class="btn btn-primary">Next Lesson</button>
        </nav>
    </main>

    <div id="toast-container"></div>

    <script src="audio.js"></script>
    <script src="fretboard.js"></script>
    <script src="lessons.js"></script>
    <script src="quiz.js"></script>
    <script src="app.js"></script>
</body>
</html>
